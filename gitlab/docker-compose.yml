services:
  gitlab:
    image: gitlab/gitlab-ce:18.7.1-ce.0
    container_name: gitlab
    restart: unless-stopped
    hostname: 'gitlab.example.com'
    ports:
      - '2424:22'
    volumes:
      - ./config:/etc/gitlab
      - ./logs:/var/log/gitlab
      - ./data:/var/opt/gitlab
    shm_size: '256m'
    networks:
      - frontend
    labels:
      - traefik.enable=true
      - traefik.http.routers.gitlab-https.rule=Host(`gitlab.pexe-server.lab.pexe.at`)
      - traefik.http.routers.gitlab-https.entrypoints=websecure
      - traefik.http.routers.gitlab-https.tls=true
      - traefik.http.routers.gitlab-https.tls.certresolver=cloudflare
      - traefik.http.routers.gitlab-service.loadbalancer.server.port=80
networks:
  frontend:
    external: true